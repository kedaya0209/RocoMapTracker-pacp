name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v1.1.0）'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller scapy pycryptodome

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --noconsole --onedir --icon rmt.ico --name "RocoMapTracker-pcap" `
            --add-data "assert;assert" `
            --add-data "RKPP;RKPP" `
            --paths RKPP `
            --hidden-import rmt_protocol `
            --hidden-import rkpp_network `
            --hidden-import rkpp_proto `
            --hidden-import rkpp_analysis `
            --hidden-import rkpp_codec `
            --hidden-import rkpp_proto_core `
            --hidden-import Data `
            --hidden-import Crypto `
            rmt_bridge.py

      - name: Package artifact
        run: |
          Compress-Archive -Path dist/RocoMapTracker-pcap/* -DestinationPath RocoMapTracker-pcap-${{ inputs.version }}.zip

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: |
            发布 ${{ inputs.version }}
          artifacts: RocoMapTracker-pcap-${{ inputs.version }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
