name: Build

on:
  push:
    branches: [main]

env:
  APP_VERSION: v1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller scapy

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --noconsole --onedir --name "RocoMapTracker-pcap" `
            --add-data "assert;assert" `
            --add-data "RKPP;RKPP" `
            --paths RKPP `
            --hidden-import rmt_protocol `
            --hidden-import rkpp_network `
            --hidden-import rkpp_proto `
            --hidden-import rkpp_analysis `
            --hidden-import rkpp_codec `
            --hidden-import rkpp_proto_core `
            --hidden-import Data `
            rmt_bridge.py

      - name: Package artifact
        run: |
          Compress-Archive -Path dist/RocoMapTracker-pcap/* -DestinationPath RocoMapTracker-pcap-${{ env.APP_VERSION }}.zip

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.APP_VERSION }}
          name: ${{ env.APP_VERSION }}
          body: |
            自动构建于 ${{ github.ref_name }}@${{ github.sha }}
          artifacts: RocoMapTracker-pcap-${{ env.APP_VERSION }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
