name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller scapy

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --noconsole --onedir --icon rmt.ico --name "RocoMapTracker-pcap" `
            --add-data "assert;assert" `
            --add-data "RKPP;RKPP" `
            --paths RKPP `
            --hidden-import rmt_protocol `
            --hidden-import rkpp_network `
            --hidden-import rkpp_proto `
            --hidden-import rkpp_analysis `
            --hidden-import rkpp_codec `
            --hidden-import rkpp_proto_core `
            --hidden-import Data `
            rmt_bridge.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RocoMapTracker-pcap
          path: dist/RocoMapTracker-pcap/
